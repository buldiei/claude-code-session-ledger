# Postgres profile (default) — server / production. Flyway owns the schema.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/session_ledger}
    username: ${SPRING_DATASOURCE_USERNAME:session_ledger}
    password: ${SPRING_DATASOURCE_PASSWORD:session_ledger}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ledger
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    schemas: ledger
    default-schema: ledger
    create-schemas: true
