# session-ledger — one deployable unit (Spring serves API + MCP + the built SvelteKit SPA).
#
#   cp .env.example .env   # edit it
#   docker compose up -d --build                  # uses external Postgres from .env
#   docker compose --profile localpg up -d --build # also spins up a bundled Postgres
#
# Reachable at http://<host>:${SERVER_PORT:-8080}  (web UI, /api, /mcp).
services:
  app:
    build: .
    image: session-ledger:1.0.3
    container_name: session-ledger
    env_file: .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    restart: unless-stopped

  # Optional bundled Postgres — only started with `--profile localpg`.
  # When you use it, set SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/session_ledger in .env
  postgres:
    image: postgres:16
    container_name: session-ledger-db
    profiles: ["localpg"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-session_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-session_ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-session_ledger}
    volumes:
      - session_ledger_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped

volumes:
  session_ledger_pgdata:
